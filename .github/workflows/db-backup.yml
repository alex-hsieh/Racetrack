name: Database Backup

on:
  schedule:
    - cron: "0 3 * * *" # daily at 03:00 UTC
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          docker run --rm postgres:16-alpine \
            pg_dump --no-owner --no-privileges --clean --if-exists "$DATABASE_URL" \
            | gzip > backup.sql.gz

      - name: Push backup to private racetrack-backups repo
        env:
          BACKUP_REPO_TOKEN: ${{ secrets.BACKUP_REPO_TOKEN }}
        run: |
          git clone "https://x-access-token:${BACKUP_REPO_TOKEN}@github.com/alex-hsieh/racetrack-backups.git" backups-repo
          cd backups-repo

          mkdir -p backups
          cp ../backup.sql.gz "backups/$(date -u +%F).sql.gz"

          # Keep a rolling 30-day window so this repo doesn't grow unbounded.
          find backups -name '*.sql.gz' -mtime +30 -delete

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups
          git commit -m "Backup $(date -u +%F)" || echo "Nothing to commit"
          git push
